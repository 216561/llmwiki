name: Codex Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: codex-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review-and-merge:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Trigger Codex Cloud review
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: '@codex review'
            });

      - name: Wait for Codex verdict
        id: verdict
        uses: actions/github-script@v7
        timeout-minutes: 10
        with:
          github-token: ${{ github.token }}
          script: |
            const { owner, repo } = context.repo;
            const pr_number = context.payload.pull_request.number;
            const maxAttempts = 20;

            for (let i = 0; i < maxAttempts; i++) {
              await new Promise(r => setTimeout(r, 30000));

              // Check for Codex review comments
              const comments = await github.rest.issues.listComments({
                owner, repo,
                issue_number: pr_number,
                per_page: 50,
                sort: 'created',
                direction: 'desc'
              });

              const codexReviews = comments.data.filter(c =>
                c.body?.includes('💡 Codex')
              );

              if (codexReviews.length > 0) {
                // Codex posted a review with suggestions → not ready
                core.info('Codex posted review with suggestions');
                core.setOutput('approved', 'false');
                return;
              }

              // Check for 👍 reaction on the PR (Codex reacts with 👍 when clean)
              try {
                const reactions = await github.rest.reactions.listForIssue({
                  owner, repo,
                  issue_number: pr_number
                });
                const thumbsUp = reactions.data.some(r => r.content === '+1');
                if (thumbsUp) {
                  core.info('Codex approved with thumbs up');
                  core.setOutput('approved', 'true');
                  return;
                }
              } catch (e) {
                core.info('Reactions check skipped: ' + e.message);
              }
            }

            core.info('Timed out waiting for Codex');
            core.setOutput('approved', 'false');

      - name: Merge PR
        if: steps.verdict.outputs.approved == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              merge_method: 'merge',
            });
